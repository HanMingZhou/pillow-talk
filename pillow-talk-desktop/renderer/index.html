<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pillow Talk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-app-region: drag;
        }
        
        /* 顶部工具栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.85) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            -webkit-app-region: drag;
        }
        
        .header h1 {
            color: white;
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header-controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        
        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        
        .icon-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }
        
        /* 摄像头区域 */
        .camera-container {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            height: 45vh;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.95) contrast(1.05);
        }
        
        canvas {
            display: none;
        }
        
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%);
            backdrop-filter: blur(20px);
            color: white;
            font-size: 1.1em;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        /* 聊天区域 */
        .chat-container {
            position: fixed;
            top: calc(64px + 45vh);
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-app-region: no-drag;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            animation: messageSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        
        @keyframes messageSlideIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
            }
        }
        
        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }
        
        .message.assistant {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.95);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .message.system {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            align-self: center;
            font-size: 13px;
            text-align: center;
            padding: 10px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* 输入区域 */
        .input-container {
            padding: 16px 20px 20px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.8) 100%);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-size: 15px;
            font-family: inherit;
            max-height: 120px;
            background: transparent;
            color: white;
            line-height: 1.5;
        }
        
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .send-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }
        
        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(102, 126, 234, 0.5);
        }
        
        .send-btn:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 420px;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            box-shadow: -4px 0 24px rgba(0, 0, 0, 0.5);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 200;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            -webkit-app-region: no-drag;
        }
        
        .sidebar.open {
            right: 0;
        }
        
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .sidebar-header {
            padding: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        
        .sidebar-header h2 {
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .sidebar-content {
            padding: 24px;
        }
        
        .setting-group {
            margin-bottom: 32px;
        }
        
        .setting-group h3 {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 16px;
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .setting-item {
            margin-bottom: 16px;
        }
        
        .setting-item label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            font-size: 0.9em;
            letter-spacing: 0.3px;
        }
        
        .setting-item input[type="text"],
        .setting-item select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .setting-item input[type="text"]:focus,
        .setting-item select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .setting-item input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .setting-item input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }
        
        .setting-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }
        
        .status-bar {
            position: fixed;
            top: 64px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.9em;
            font-weight: 500;
            z-index: 90;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            max-width: 90%;
        }
        
        .status-bar.success {
            background: rgba(72, 187, 120, 0.9);
            color: white;
        }
        
        .status-bar.error {
            background: rgba(245, 101, 101, 0.9);
            color: white;
        }
        
        .status-bar.info {
            background: rgba(66, 153, 225, 0.9);
            color: white;
        }
        
        .status-bar.hidden {
            transform: translateX(-50%) translateY(-150%);
            opacity: 0;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
            transition: opacity 0.3s ease;
        }
        
        .overlay.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 顶部工具栏 -->
    <div class="header">
        <h1>🛏️ Pillow Talk</h1>
        <div class="header-controls">
            <button id="cameraBtn" class="icon-btn" title="摄像头">📷</button>
            <button id="pauseAudioBtn" class="icon-btn" title="暂停播放">⏸️</button>
            <button id="clearChatBtn" class="icon-btn" title="清空对话">🗑️</button>
            <button id="settingsBtn" class="icon-btn" title="设置">⚙️</button>
        </div>
    </div>

    <!-- 状态栏 -->
    <div id="statusBar" class="status-bar info">正在初始化...</div>

    <!-- 摄像头区域 -->
    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        <div id="cameraOverlay" class="camera-overlay">
            <div>点击 📷 启动摄像头</div>
        </div>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-container">
        <div id="chatMessages" class="chat-messages">
            <div class="message system">欢迎使用 Pillow Talk 桌面版！启动摄像头后直接输入问题即可。</div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="输入你的问题..." rows="1"></textarea>
            </div>
            <button id="sendMessageBtn" class="send-btn" disabled>➤</button>
        </div>
    </div>

    <!-- 侧边栏 -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>设置</h2>
            <button id="closeSidebarBtn" class="icon-btn">✕</button>
        </div>
        
        <div class="sidebar-content">
            <div class="setting-group">
                <h3>🤖 模型设置</h3>
                <div class="setting-item">
                    <label>模型提供商</label>
                    <select id="provider">
                        <option value="doubao">豆包 (Doubao)</option>
                        <option value="openai">OpenAI</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="qwen">千问 (Qwen)</option>
                        <option value="glm">智谱 GLM</option>
                        <option value="custom">自定义模型 (Custom)</option>
                    </select>
                </div>
                
                <div id="customModelSettings" style="display:none;">
                    <div class="setting-item">
                        <label>模型名称</label>
                        <input type="text" id="modelNameInput" placeholder="例如: llama3.2-vision">
                    </div>
                    <div class="setting-item">
                        <label>API Key</label>
                        <input type="text" id="apiKeyInput" placeholder="你的 API Key">
                    </div>
                    <div class="setting-item">
                        <label>Base URL</label>
                        <input type="text" id="baseUrlInput" placeholder="例如: http://localhost:11434/v1">
                    </div>
                </div>
            </div>

            <div class="setting-group">
                <h3>💬 提示词设置</h3>
                <div class="setting-item">
                    <label>提示词模板</label>
                    <select id="promptTemplate">
                        <option value="custom">自定义</option>
                        <option value="museum">博物馆讲解员</option>
                        <option value="pet">可爱宠物</option>
                        <option value="scientist">科普专家</option>
                        <option value="critic">毒舌评论家</option>
                        <option value="companion">骚话陪伴者</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>系统提示词</label>
                    <input type="text" id="systemPrompt" value="你是一个友好的助手">
                </div>
            </div>

            <div class="setting-group">
                <h3>🎙️ 语音设置</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="enableTTS" checked>
                        启用语音播报
                    </label>
                </div>
                <div class="setting-item">
                    <label>语音音色</label>
                    <select id="voiceSelect">
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>语速</label>
                    <input type="range" id="speechRate" min="0.5" max="2" step="0.1" value="1.0">
                    <span id="rateValue">1.0x</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 遮罩层 -->
    <div id="overlay" class="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
